<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Stokvel Management</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="pages.css">
</head>
<body>
  <section class="app-layout" data-testid="admin-dashboard">

    <!-- Sidebar -->
    <aside class="sidebar" data-testid="sidebar">
      <header class="sidebar-logo">
        <figure class="logo-circles" style="width: 36px; height: 36px;">
          <i class="logo-circle logo-circle-green" style="width: 24px; height: 24px;"></i>
          <i class="logo-circle logo-circle-blue" style="width: 24px; height: 24px;"></i>
        </figure>
        <h2>Stokvel</h2>
      </header>

      <nav class="sidebar-nav">
        <section class="nav-section">
          <p class="nav-section-title">Main Menu</p>
          <a href="admin-dashboard.html" class="nav-link active" data-testid="nav-dashboard">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="9"></rect>
              <rect x="14" y="3" width="7" height="5"></rect>
              <rect x="14" y="12" width="7" height="9"></rect>
              <rect x="3" y="16" width="7" height="5"></rect>
            </svg>
            Dashboard
          </a>
          <a href="create-group.html" class="nav-link" data-testid="nav-create-group">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="16"></line>
              <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            Create Group
          </a>
          <a href="invite-members.html" class="nav-link" data-testid="nav-invite">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="8.5" cy="7" r="4"></circle>
              <line x1="20" y1="8" x2="20" y2="14"></line>
              <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
            Invite Members
          </a>
          <a href="contributions.html" class="nav-link" data-testid="nav-contributions">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="1" x2="12" y2="23"></line>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            Contributions
          </a>
        </section>
      </nav>

      <footer class="sidebar-user" data-testid="user-info">
        <abbr class="user-avatar" title="User initials">TM</abbr>
        <section class="user-info">
          <strong class="user-name">Thabo Mokoena</strong>
          <em class="user-role">Admin</em>
        </section>
        <button class="btn btn-ghost btn-sm" onclick="logout()" data-testid="logout-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </footer>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <h1>Dashboard</h1>
        <p>Welcome back! Here's an overview of your stokvel groups.</p>
      </header>

      <!-- Stats Grid -->
      <section id="stats-grid" class="stats-grid" data-testid="stats-grid">
        <!-- Rendered by JavaScript -->
      </section>

      <!-- Groups Section -->
      <article class="card" style="padding: 0;">
        <header class="card-header" style="padding: 1.5rem;">
          <h3 class="card-title">Your Stokvel Groups</h3>
          <a href="create-group.html" class="btn btn-primary btn-sm" data-testid="create-group-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            New Group
          </a>
        </header>
        <section id="groups-grid" class="groups-grid" style="padding: 0 1.5rem 1.5rem;" data-testid="groups-grid">
          <!-- Rendered by JavaScript -->
        </section>
      </article>
    </main>

  </section>

  <output id="toast-container" class="toast-container"></output>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-dashboard.js"></script>
  <script src="js/groups.js"></script>
  <script src="js/invites.js"></script>
  <script src="js/contributions.js"></script>
  <script src="js/dashboards.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
