<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Stokvel Management</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="pages.css">
</head>
<body>
  <section class="app-layout" data-testid="admin-dashboard">

    <!-- Sidebar -->
    <aside class="sidebar" data-testid="sidebar">
      <header class="sidebar-logo">
        <figure class="logo-circles" style="width: 36px; height: 36px;">
          <i class="logo-circle logo-circle-green" style="width: 24px; height: 24px;"></i>
          <i class="logo-circle logo-circle-blue" style="width: 24px; height: 24px;"></i>
        </figure>
        <h2>Stokvel</h2>
      </header>

      <nav class="sidebar-nav">
        <section class="nav-section">
          <!-- Rebuilt dynamically by checkAuth() based on user role -->
          <p class="nav-section-title">Main Menu</p>
        </section>
      </nav>

      <footer class="sidebar-user" data-testid="user-info">
        <abbr class="user-avatar" title="User initials">TM</abbr>
        <section class="user-info">
          <strong class="user-name">Thabo Mokoena</strong>
          <em class="user-role">Admin</em>
        </section>
        <button class="btn btn-ghost btn-sm" onclick="logout()" data-testid="logout-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </footer>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <h1>Dashboard</h1>
        <p>Welcome back! Here's an overview of your stokvel groups.</p>
      </header>

      <!-- Stats Grid -->
      <section id="stats-grid" class="stats-grid" data-testid="stats-grid">
        <!-- Rendered by JavaScript -->
      </section>

      <!-- Groups Section -->
      <article class="card" style="padding: 0; margin-bottom: 1.5rem;">
        <header class="card-header" style="padding: 1.5rem;">
          <h3 class="card-title">Your Stokvel Groups</h3>
          <a href="create-group.html" class="btn btn-primary btn-sm" data-testid="create-group-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            New Group
          </a>
        </header>
        <section id="groups-grid" class="groups-grid" style="padding: 0 1.5rem 1.5rem;" data-testid="groups-grid">
          <!-- Rendered by JavaScript -->
        </section>
      </article>

      <!-- Member Role Management Section -->
      <article class="card" style="padding: 0;" data-testid="role-management-card">
        <header class="card-header" style="padding: 1.5rem;">
          <h3 class="card-title">Manage Member Roles</h3>
          <p style="font-size: 0.85rem; color: var(--slate-500); margin: 0;">
            Assign members as Treasurer to give them financial management access.
          </p>
        </header>
        <section style="padding: 0 1.5rem 1.5rem;" data-testid="role-management-panel">
          <div id="role-management-panel">
            <p style="color: var(--slate-400); font-size: .9rem;">Loading members…</p>
          </div>
        </section>
      </article>
    </main>

  </section>

  <output id="toast-container" class="toast-container"></output>
  <script type="module" src="js/main.js"></script>
</body>
</html>
