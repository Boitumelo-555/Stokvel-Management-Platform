<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Group - Stokvel Management</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="pages.css">
</head>
<body>
  <section class="app-layout" data-testid="create-group-page">

    <!-- Sidebar -->
    <aside class="sidebar" data-testid="sidebar">
      <header class="sidebar-logo">
        <figure class="logo-circles" style="width: 36px; height: 36px;">
          <i class="logo-circle logo-circle-green" style="width: 24px; height: 24px;"></i>
          <i class="logo-circle logo-circle-blue" style="width: 24px; height: 24px;"></i>
        </figure>
        <h2>Stokvel</h2>
      </header>

      <nav class="sidebar-nav">
        <section class="nav-section">
          <p class="nav-section-title">Main Menu</p>
          <a href="admin-dashboard.html" class="nav-link" data-testid="nav-dashboard">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="9"></rect>
              <rect x="14" y="3" width="7" height="5"></rect>
              <rect x="14" y="12" width="7" height="9"></rect>
              <rect x="3" y="16" width="7" height="5"></rect>
            </svg>
            Dashboard
          </a>
          <a href="create-group.html" class="nav-link active" data-testid="nav-create-group">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="16"></line>
              <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            Create Group
          </a>
          <a href="invite-members.html" class="nav-link" data-testid="nav-invite">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="8.5" cy="7" r="4"></circle>
              <line x1="20" y1="8" x2="20" y2="14"></line>
              <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
            Invite Members
          </a>
          <a href="contributions.html" class="nav-link" data-testid="nav-contributions">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="1" x2="12" y2="23"></line>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            Contributions
          </a>
        </section>
      </nav>

      <footer class="sidebar-user" data-testid="user-info">
        <abbr class="user-avatar" title="User initials">TM</abbr>
        <section class="user-info">
          <strong class="user-name">Thabo Mokoena</strong>
          <em class="user-role">Admin</em>
        </section>
        <button class="btn btn-ghost btn-sm" onclick="logout()" data-testid="logout-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </footer>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <a href="admin-dashboard.html" style="display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--slate-500); margin-bottom: 0.5rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Back to Dashboard
        </a>
        <h1>Create a New Stokvel Group</h1>
        <p>Set up your savings group with contribution rules and schedule.</p>
      </header>

      <article class="card" style="max-width: 600px;">
        <form id="create-group-form" data-testid="create-group-form">
          <fieldset class="form-group" style="border: none; padding: 0; margin: 0;">
            <label class="form-label" for="groupName">Group Name *</label>
            <input
              type="text"
              id="groupName"
              name="groupName"
              class="form-input"
              placeholder="e.g., Family Savings Circle"
              required
              data-testid="input-group-name"
            >
            <small class="form-hint">Choose a memorable name for your stokvel group</small>
          </fieldset>

          <fieldset class="form-group" style="border: none; padding: 0; margin: 0;">
            <label class="form-label" for="contribution">Contribution Amount (ZAR) *</label>
            <input
              type="number"
              id="contribution"
              name="contribution"
              class="form-input"
              placeholder="e.g., 500"
              min="100"
              required
              data-testid="input-contribution"
            >
            <small class="form-hint">Minimum contribution is R100</small>
          </fieldset>

          <fieldset class="form-group" style="border: none; padding: 0; margin: 0;">
            <label class="form-label" for="frequency">Contribution Frequency *</label>
            <select
              id="frequency"
              name="frequency"
              class="form-select"
              required
              data-testid="select-frequency"
            >
              <option value="">Select frequency</option>
              <option value="Weekly">Weekly</option>
              <option value="Bi-weekly">Bi-weekly</option>
              <option value="Monthly">Monthly</option>
            </select>
          </fieldset>

          <fieldset class="form-group" style="border: none; padding: 0; margin: 0;">
            <label class="form-label" for="startDate">Start Date *</label>
            <input
              type="date"
              id="startDate"
              name="startDate"
              class="form-input"
              required
              data-testid="input-start-date"
            >
          </fieldset>

          <fieldset class="form-group" style="border: none; padding: 0; margin: 0;">
            <label class="form-label" for="description">Description (Optional)</label>
            <textarea
              id="description"
              name="description"
              class="form-textarea"
              placeholder="Describe the purpose of this stokvel group..."
              data-testid="input-description"
            ></textarea>
          </fieldset>

          <menu style="display: flex; gap: 12px; margin-top: 1.5rem; padding: 0; list-style: none;">
            <li>
              <button type="submit" class="btn btn-primary btn-lg" data-testid="submit-create-group">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                  <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                Create Group
              </button>
            </li>
            <li>
              <a href="admin-dashboard.html" class="btn btn-outline btn-lg">Cancel</a>
            </li>
          </menu>
        </form>
      </article>
    </main>

  </section>

  <output id="toast-container" class="toast-container"></output>
    
  
  
  
  
  
  
  
  
  <script type="module" src="./js/main.js"></script>
</body>
</html>
