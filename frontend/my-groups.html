<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Groups - Stokvel Management</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="pages.css">
</head>
<body>
  <section class="app-layout" data-testid="my-groups-page">

    <!-- Sidebar (populated by auth.js checkAuth) -->
    <aside class="sidebar" data-testid="sidebar">
      <header class="sidebar-logo">
        <figure class="logo-circles" style="width: 36px; height: 36px;">
          <i class="logo-circle logo-circle-green" style="width: 24px; height: 24px;"></i>
          <i class="logo-circle logo-circle-blue" style="width: 24px; height: 24px;"></i>
        </figure>
        <h2>Stokvel</h2>
      </header>
      <nav class="sidebar-nav">
        <section class="nav-section">
          <p class="nav-section-title">Menu</p>
        </section>
      </nav>
      <footer class="sidebar-user" data-testid="user-info">
        <abbr class="user-avatar" title="User initials">--</abbr>
        <section class="user-info">
          <strong class="user-name">Loading...</strong>
          <em class="user-role">--</em>
        </section>
        <button class="btn btn-ghost btn-sm" onclick="logout()" data-testid="logout-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </footer>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <h1>My Groups</h1>
        <p>All stokvel groups you are a member of.</p>
      </header>

      <!-- Stats row -->
      <section class="stats-grid" data-testid="groups-stats" style="margin-bottom: 1.5rem;">
        <article class="stat-card" data-testid="stat-active-groups">
          <figure class="stat-card-icon green">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </figure>
          <strong class="stat-value" id="stat-group-count">--</strong>
          <p class="stat-label">Total Groups</p>
        </article>
        <article class="stat-card" data-testid="stat-total-contribution">
          <figure class="stat-card-icon blue">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="1" x2="12" y2="23"></line>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
          </figure>
          <strong class="stat-value" id="stat-monthly-total">--</strong>
          <p class="stat-label">Total Monthly Commitment</p>
        </article>
      </section>

      <!-- Groups Grid -->
      <article class="card">
        <header class="card-header">
          <h3 class="card-title">Your Stokvel Groups</h3>
        </header>
        <section id="groups-container" class="groups-grid" data-testid="groups-grid">
          <!-- Rendered by JS -->
          <p style="color: var(--slate-400); font-size: 0.9rem;" id="groups-loading">Loading your groups…</p>
        </section>
      </article>
    </main>
  </section>

  <output id="toast-container" class="toast-container"></output>
  <script type="module" src="js/main.js"></script>
</body>
</html>
